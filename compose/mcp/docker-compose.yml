# Pin the compose project name so it stays consistent across the move
# from prog-strength-mcp/ into prog-strength-infra/compose/mcp/.
name: prog-strength-mcp

services:
  mcp:
    # ECR_REGISTRY and APP_VERSION come from .env, written by the deploy
    # workflow. Rollback = change APP_VERSION and re-run compose up; tags
    # are immutable so each version always resolves to the same bytes.
    image: ${ECR_REGISTRY}/prog-strength-prod/mcp:${APP_VERSION:-dev}
    # No public `ports:` — Caddy (in the api stack) is the only
    # public-facing container. Caddy reaches us at `mcp:8000` via the
    # shared docker network.
    expose:
      - "8000"
    environment:
      # Calls the api container directly on the shared docker network.
      # Avoids re-entering the public Caddy hop and the TLS roundtrip.
      - PROG_STRENGTH_API_BASE_URL=http://api:8080
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      # Released semver (e.g. "v0.1.0"), surfaced by the /health endpoint.
      # Defaults to "dev" for local `docker compose up` without a release.
      - APP_VERSION=${APP_VERSION:-dev}
      # External nutrition lookup providers (lookup_food_nutrition).
      # Optional: empty values mean the tool answers lookup_unavailable
      # and the agent falls back to estimating macros itself. Values
      # land in .env via the mcp repo's deploy workflow.
      - FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID:-}
      - FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET:-}
      - USDA_FDC_API_KEY=${USDA_FDC_API_KEY:-}
    restart: unless-stopped
    # Ship stdout/stderr to CloudWatch Logs via Docker's built-in
    # awslogs driver. Log group is pre-created by the Terraform
    # `logging` module; see prog-strength-docs/sows/cloudwatch-logs.md.
    # AWS_REGION is REQUIRED — see the agent compose for the full
    # reasoning, but short version: a missing AWS_REGION silently
    # falls back to us-east-1, which doesn't match Terraform's
    # us-east-2 log groups, which means CreateLogStream 403s and the
    # container fails to start. Better to fail at `docker compose
    # up` time with a clear message.
    logging:
      driver: awslogs
      options:
        awslogs-region: "${AWS_REGION:?AWS_REGION must be set; awslogs region must match the Terraform log-group region}"
        awslogs-group: /prog-strength/mcp
        awslogs-create-stream: "true"

# Join the shared network the api + caddy live on. `external: true` means
# docker compose won't try to create or destroy it — the host owns its
# lifecycle (bootstrap.sh creates it on fresh hosts).
networks:
  default:
    name: prog-strength
    external: true
