# Pin the compose project name so it stays consistent across the move
# from prog-strength-agent/ into prog-strength-infra/compose/agent/.
name: prog-strength-agent

services:
  agent:
    # ECR_REGISTRY and APP_VERSION come from .env, written by the deploy
    # workflow. Rollback = change APP_VERSION and re-run compose up; tags
    # are immutable so each version always resolves to the same bytes.
    image: ${ECR_REGISTRY}/prog-strength-prod/agent:${APP_VERSION:-dev}
    # No public `ports:` — Caddy (in the api stack) is the only
    # public-facing container. Caddy reaches us at `agent:8001` via the
    # shared docker network.
    expose:
      - "8001"
    environment:
      # MCP lives in the same shared docker network — talk to it by
      # service name rather than over the public Caddy hop.
      - PROG_STRENGTH_MCP_URL=http://mcp:8000/mcp
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=8001
      # Forwarded from .env, which the deploy workflow writes from
      # GitHub repository secrets on each release.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY is optional. Empty → /speak returns 503 at
      # request time; the rest of the agent (chat + title) keeps
      # working. See prog-strength-docs/sows/voice-chat.md.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # OpenAI TTS tunables. Override to flip voice / model / vibe
      # without rebuilding the image — same shape as the Claude model
      # envs above. gpt-4o-mini-tts is the current default because
      # the "cedar" voice is only available there (not on tts-1) and
      # the model also accepts the `instructions` string we use to
      # carry the Prog Strength coach personality + pacing cue.
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - TTS_VOICE_DEFAULT=${TTS_VOICE_DEFAULT:-cedar}
      - TTS_DAILY_CHAR_CAP_PER_USER=${TTS_DAILY_CHAR_CAP_PER_USER:-50000}
      # Optional ops override for the TTS personality / pacing cue.
      # Intentionally written without `=` so an unset host env stays
      # unset inside the container — that lets the Python default in
      # config.py (the fitness-coach personality string) take effect.
      # Writing `${TTS_INSTRUCTIONS:-}` instead would silently set
      # the var to empty, blocking the Python default from ever
      # firing.
      - TTS_INSTRUCTIONS
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      # Tiered model routing: simple/complex tiers + a classifier
      # router. The agent's ModelRouter picks one of the two response
      # tiers per request. Override these to A/B-test models without
      # rebuilding the image.
      - CLAUDE_MODEL_SIMPLE=${CLAUDE_MODEL_SIMPLE:-claude-haiku-4-5-20251001}
      - CLAUDE_MODEL_COMPLEX=${CLAUDE_MODEL_COMPLEX:-claude-sonnet-4-6}
      - CLAUDE_MODEL_ROUTER=${CLAUDE_MODEL_ROUTER:-claude-haiku-4-5-20251001}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-2048}
      # Comma-separated origins allowed to call /chat from the browser.
      # The frontend lives on Vercel, so cross-origin CORS is required.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      # Released semver (e.g. "v0.1.0"), surfaced by the /health endpoint.
      # Defaults to "dev" for local `docker compose up` without a release.
      - APP_VERSION=${APP_VERSION:-dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Ship stdout/stderr to CloudWatch Logs via Docker's built-in
    # awslogs driver — no sidecar process, no agent container, no
    # on-disk log file management. The log group is pre-created by
    # the Terraform `logging` module so the EC2 instance role can
    # drop logs:CreateLogGroup for least-privilege. See
    # prog-strength-docs/sows/cloudwatch-logs.md.
    #
    # AWS_REGION is forwarded from .env (written by the deploy
    # workflow); a region must be set or the driver fails to start
    # the container. The us-east-1 fallback exists for local
    # `docker compose up` against a developer's account.
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-group: /prog-strength/agent
        awslogs-create-stream: "true"

# Join the shared network the api + mcp + caddy live on. `external: true`
# means docker compose won't try to create or destroy it — the host owns
# its lifecycle (bootstrap.sh creates it on fresh hosts).
networks:
  default:
    name: prog-strength
    external: true
