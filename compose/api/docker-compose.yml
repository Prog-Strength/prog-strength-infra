# Pin the compose project name so named volumes (caddy_data, caddy_config)
# keep their existing identifiers after the move from prog-strength-api/
# into prog-strength-infra/compose/api/. Without this, the project name
# defaults to the directory name ("api") and Caddy would lose its
# Let's Encrypt certs on the existing host.
name: prog-strength-api

services:
  # One-shot restore from S3 before the API opens the DB. Skips when a
  # local /data/app.db already exists (so a redeploy on the same host
  # doesn't clobber live data) and when no replica is in S3 (first-ever
  # boot, before any backups have been written). The api service waits
  # for this to exit 0 via the depends_on condition below.
  restore:
    image: litestream/litestream:0.3.13
    environment:
      - LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
      - LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION:-us-east-2}
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command:
      - restore
      - -if-db-not-exists
      - -if-replica-exists
      - -config
      - /etc/litestream.yml
      - /data/app.db
    restart: "no"

  # Same restore pattern for the telemetry DB. The `litestream restore`
  # subcommand only restores one path per invocation, so we run a second
  # one-shot container in parallel with `restore`. The api depends on
  # both completing successfully — see depends_on below. The skip-guards
  # are identical to `restore`: existing local DB wins; missing replica
  # is a no-op for first-ever boots.
  restore-telemetry:
    image: litestream/litestream:0.3.13
    environment:
      - LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
      - LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION:-us-east-2}
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command:
      - restore
      - -if-db-not-exists
      - -if-replica-exists
      - -config
      - /etc/litestream.yml
      - /data/telemetry.db
    restart: "no"

  api:
    # ECR_REGISTRY and APP_VERSION come from .env, written by the deploy
    # workflow. Rollback = change APP_VERSION and re-run compose up; tags
    # are immutable so each version always resolves to the same bytes.
    image: ${ECR_REGISTRY}/prog-strength-prod/api:${APP_VERSION:-dev}
    # No `ports:` — the api is only reachable on the docker-compose
    # internal network. Caddy is the only public-facing container.
    expose:
      - "8080"
    environment:
      - DATABASE_URL=/data/app.db
      - SERVER_ADDR=:8080
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # base64-encoded 32-byte AES key used to encrypt stored Google
      # refresh tokens at rest. Optional here (delivered via .env by the
      # api repo's deploy workflow, same as the secrets above). Losing or
      # rotating this key invalidates every stored refresh token — users
      # must re-consent to Google Calendar. Mint with `openssl rand -base64 32`.
      - CALENDAR_TOKEN_ENC_KEY=${CALENDAR_TOKEN_ENC_KEY:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      # Second OAuth callback URL for the Google Calendar consent flow
      # (Phase 3). Optional; lands in .env via the api deploy workflow.
      - GOOGLE_CALENDAR_REDIRECT_URL=${GOOGLE_CALENDAR_REDIRECT_URL:-}
      - DEV_AUTH=${DEV_AUTH}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN}
      - RETURN_TO_ALLOWED_ORIGINS=${RETURN_TO_ALLOWED_ORIGINS}
      - BETA_ALLOWED_EMAILS=${BETA_ALLOWED_EMAILS}
      # If unset, the API silently falls back to an in-memory TCX archiver
      # (running/server.go) and uploaded TCX files vanish on container restart
      # — DB rows for those runs survive, the original bytes do not.
      - TCX_BUCKET_NAME=${TCX_BUCKET_NAME}
      # If unset, the API silently falls back to an in-memory avatar store
      # (internal/user/avatar_store.go) and uploaded avatars vanish on
      # container restart — DB rows survive, the original bytes do not.
      # The avatar store also needs AWS_REGION forwarded (see below).
      - AVATAR_BUCKET_NAME=${AVATAR_BUCKET_NAME}
      # The api's S3 archiver builds its client via config.LoadDefaultConfig,
      # which resolves region from AWS_REGION / AWS_DEFAULT_REGION / config
      # file / IMDS. None of those are reachable inside the container: env
      # is empty unless we forward it, ~/.aws is absent, and IMDS is one hop
      # away across the Docker bridge (default put-response-hop-limit is 1).
      # Without this line, PutObject fails endpoint resolution with
      # "Invalid region: region was not a valid DNS name" and every TCX
      # upload 500s with running: tcx storage failed. Mirrors the
      # LITESTREAM_REPLICA_REGION forward the litestream sidecar uses.
      - AWS_REGION=${AWS_REGION}
      # Per-user daily external-API spend ceiling. Hardcoded here, not
      # forwarded from a GitHub secret, because the value is a public
      # tunable and version control gives us a reviewable history of cap
      # changes. ~$20/user/month at this rate (0.67 × 30 ≈ 20) — raised
      # from 0.17 (~$5/month) and then 0.33 (~$10/month) on 2026-06-12
      # after the owner kept hitting the daily cap under normal usage.
      # Override path via `.env` is
      # preserved for emergency tuning without a PR; set
      # DAILY_USAGE_CAP_USD in the operator .env if you need to (note:
      # the api deploy workflow rewrites .env, so manual overrides only
      # live until the next deploy — this default is the durable knob).
      # 0 = capping disabled (the API treats it as "uncapped"); see
      # internal/config/config.go for the read-side semantics.
      - DAILY_USAGE_CAP_USD=${DAILY_USAGE_CAP_USD:-0.67}
      # External nutrition lookup providers (GET /nutrition/lookup,
      # surfaced to the agent via MCP's lookup_food_nutrition). Optional:
      # empty values mean the endpoint answers 503 lookup_unavailable and
      # the agent falls back to estimating macros itself. Values land in
      # .env via the api repo's deploy workflow. See
      # prog-strength-docs/sows/custom-meal-macro-accuracy.md.
      - FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID:-}
      - FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET:-}
      - USDA_FDC_API_KEY=${USDA_FDC_API_KEY:-}
      # Structured-log verbosity for the nutrition lookup path (the
      # repo's first slog adopter; log.Printf elsewhere is unaffected).
      # debug while the feature is under active development — flip to
      # info here (a reviewable one-line change, like the usage cap
      # above) once things reach steady state to cut CloudWatch
      # ingestion volume per request.
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      # Persist SQLite database on host. Resolves to the directory next to
      # this compose file (prog-strength-infra/compose/api/data on prod).
      - ./data:/data
    restart: unless-stopped
    depends_on:
      restore:
        condition: service_completed_successfully
      restore-telemetry:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Ship stdout/stderr to CloudWatch Logs via Docker's built-in
    # awslogs driver. Only the api service ships — the restore +
    # litestream sidecars and Caddy keep the default json-file
    # driver, because their output is plumbing noise and we don't
    # want to double the ingestion bill for output that's only
    # useful while SSH'd to the host. See
    # prog-strength-docs/sows/cloudwatch-logs.md.
    # AWS_REGION is REQUIRED — see the agent compose for the full
    # reasoning. Short version: missing AWS_REGION silently falls
    # back to us-east-1, which doesn't match Terraform's us-east-2
    # log groups, leading to CreateLogStream 403s at container
    # start. Fail fast at compose-up time instead.
    logging:
      driver: awslogs
      options:
        awslogs-region: "${AWS_REGION:?AWS_REGION must be set; awslogs region must match the Terraform log-group region}"
        awslogs-group: /prog-strength/api
        awslogs-create-stream: "true"

  # Long-running sidecar: streams WAL frames to S3 continuously. Shares
  # /data with the api container so it sees app.db and app.db-wal as the
  # api writes to them. Waits for the api to come up healthy so we don't
  # log spurious "db not found" errors during cold start.
  litestream:
    image: litestream/litestream:0.3.13
    environment:
      - LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
      - LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION:-us-east-2}
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate", "-config", "/etc/litestream.yml"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile lives two directories up in this same repo. Bind-mounting
      # the *directory* (not the single Caddyfile inside it) gives
      # late-binding semantics: `git pull` updates the file via rename, and
      # the container sees the new inode immediately. A single-file bind
      # mount would stay pinned to the original inode after a pull and a
      # caddy reload would silently no-op.
      - ${CADDY_CONFIG_DIR:-../../caddy}:/etc/caddy:ro
      # caddy_data MUST persist — it stores issued Let's Encrypt certs
      # and the ACME account key. Wiping it forces re-issuance and will
      # quickly trip Let's Encrypt's rate limits.
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

# Shared with the mcp + agent stacks (and any future sibling services) so
# Caddy can reverse-proxy to them by service name. Lifecycle is owned by
# the host — bootstrap.sh creates it once, and `external: true` prevents
# `docker compose down` from removing it while siblings are still attached.
networks:
  default:
    name: prog-strength
    external: true
